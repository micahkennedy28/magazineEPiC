<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magazine Archive — E.P.i.C. Youth Ministry</title>
  <link rel="icon" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#0A0A0A', foreground: '#FFFFFF',
            card: '#111111', border: '#262626',
            primary: { DEFAULT: '#D4AF37', foreground: '#0A0A0A' },
            secondary: { DEFAULT: '#F97316', foreground: '#FFFFFF' },
            accent: { DEFAULT: '#3B82F6', foreground: '#FFFFFF' },
            muted: { DEFAULT: '#262626', foreground: '#A6A6A6' },
          },
          fontFamily: {
            heading: ['Anton','sans-serif'],
            subheading: ['Bebas Neue','sans-serif'],
            sans: ['Poppins','sans-serif'],
          },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-background text-white font-sans flex flex-col min-h-screen">
  <div id="nav-root"></div>

  <main class="flex-grow pb-24" style="background:#0A0A0A;">

    <!-- Header -->
    <section class="py-20 text-center" style="background:#111; border-bottom:1px solid rgba(255,255,255,0.05);">
      <div class="max-w-7xl mx-auto px-4">
        <h1 class="font-heading uppercase leading-none mb-4" style="font-size:clamp(3rem,8vw,5rem); letter-spacing:-0.03em;">
          Magazine <span style="color:#D4AF37;">Archive</span>
        </h1>
        <p class="font-sans text-xl max-w-2xl mx-auto" style="color:#a3a3a3;">
          Browse through our collection of faith, creativity, and testimonies.
        </p>
      </div>
    </section>

    <div class="max-w-7xl mx-auto px-4 mt-16">

      <!-- Latest Issue (filled by JS) -->
      <section id="latest-section" class="mb-24">
        <div class="skeleton rounded-3xl" style="width:100%;height:500px;"></div>
      </section>

      <!-- Archive Grid (filled by JS) -->
      <section>
        <div class="flex items-center gap-4 mb-10">
          <h2 class="font-heading text-3xl uppercase" style="color:#fff;">Past Issues</h2>
          <div class="flex-grow" style="height:1px;background:linear-gradient(to right, rgba(255,255,255,0.1), transparent);"></div>
        </div>
        <div id="archive-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-6 gap-y-12">
          <!-- Skeleton cards -->
          <div class="space-y-4">
            <div class="skeleton" style="width:100%;aspect-ratio:3/4;border-radius:0.75rem;"></div>
            <div class="skeleton" style="width:75%;height:24px;"></div>
            <div class="skeleton" style="width:50%;height:16px;"></div>
          </div>
          <div class="space-y-4">
            <div class="skeleton" style="width:100%;aspect-ratio:3/4;border-radius:0.75rem;"></div>
            <div class="skeleton" style="width:75%;height:24px;"></div>
            <div class="skeleton" style="width:50%;height:16px;"></div>
          </div>
          <div class="space-y-4">
            <div class="skeleton" style="width:100%;aspect-ratio:3/4;border-radius:0.75rem;"></div>
            <div class="skeleton" style="width:75%;height:24px;"></div>
            <div class="skeleton" style="width:50%;height:16px;"></div>
          </div>
          <div class="space-y-4">
            <div class="skeleton" style="width:100%;aspect-ratio:3/4;border-radius:0.75rem;"></div>
            <div class="skeleton" style="width:75%;height:24px;"></div>
            <div class="skeleton" style="width:50%;height:16px;"></div>
          </div>
        </div>
      </section>
    </div>

  </main>

  <div id="footer-root"></div>
  <div id="toast-container"></div>
  <script type="module" src="/js/magazine.js"></script>
</body>
</html>
